services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - backend-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - frontend-network
    volumes:
      - frontend_static:/app/static
    restart: no

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - backend-network
      - frontend-network
    volumes:
      - frontend_static:/app/static
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/momo-store/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  frontend_static:
    
networks:
  backend-network:
    driver: bridge
    internal: true
  frontend-network:
    driver: bridge